name: sync-images 🐳
on:
  workflow_dispatch:
  push:
    paths:
      - 'config.yaml'
permissions:
  contents: write
jobs:
  sync-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      
      - name: Read config yaml
        uses: actions-tools/yaml-outputs@v2
        id: yaml
        with:
          file-path: './config.yaml'

      - name: Aggregate images
        id: aggregate
        run: | 
          images=()
          env_vars=$(env | grep '^source__images__')
          while IFS='=' read -r key value; do
            images+=("$value")
          done <<< "$env_vars"
          echo "source__images=${images[*]}" >> $GITHUB_ENV

      - name: Copy images with Skopeo
        run: |
          # Login to target registry
          echo "${{ secrets.DOCKER_PASSWORD }}" | skopeo login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin \
            "${{ env.target__host }}"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin \
            "${{ env.target__host }}"

          # Extract the array from the environment variable
          images=$(echo ${{ env.source__images }} | tr -d '[]' | tr ',' ' ')

          new_images=()
          for image in $images; do
            new_tag="${{ env.target__host }}/${{ env.target__namespace }}/${image##*/}"
            new_images+=("$new_tag")
            echo "=== Copying image: $image -> $new_tag ==="

            raw=$(skopeo inspect --raw --tls-verify=false "docker://$image")

            if echo "$raw" | grep -q '"manifests"'; then
              # Multi-arch: copy each real platform individually, then combine
              platform_tags=()

              # Extract real platforms, skipping attestations (os=unknown)
              while IFS= read -r platform; do
                [[ -z "$platform" ]] && continue
                os_=$(echo "$platform" | cut -d/ -f1)
                arch_=$(echo "$platform" | cut -d/ -f2)
                variant_=$(echo "$platform" | cut -d/ -f3)

                arch_slug=$(echo "$platform" | tr '/' '-')
                ptag="${new_tag%%:*}:${new_tag##*:}-${arch_slug}"

                variant_flag=""
                [[ -n "$variant_" ]] && variant_flag="--override-variant $variant_"

                echo "  → $platform: $ptag"
                # shellcheck disable=SC2086
                skopeo copy \
                  --format v2s2 \
                  --src-tls-verify=false \
                  --override-os "$os_" \
                  --override-arch "$arch_" \
                  $variant_flag \
                  "docker://$image" "docker://$ptag"

                platform_tags+=("$ptag")
              done < <(echo "$raw" | python3 -c "import sys,json;d=json.load(sys.stdin);[print(p['os']+'/'+p['architecture']+('/'+p['variant'] if p.get('variant') else '')) for m in d.get('manifests',[]) for p in [m.get('platform',{})] if p.get('os') not in ('','unknown') and p.get('architecture') not in ('','unknown')]")

              # Combine into a Docker manifest list
              docker buildx imagetools create -t "$new_tag" "${platform_tags[@]}"
            else
              # Single-arch: copy directly
              skopeo copy \
                --format v2s2 \
                --src-tls-verify=false \
                "docker://$image" "docker://$new_tag"
            fi
          done
          echo "target__images=${new_images[*]}" >> $GITHUB_ENV

      - name: Modify README.md
        run: |
          images=$(echo ${{ env.target__images }} | tr -d '[]' | tr ',' ' ')
          timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          # Preserve historical records by appending instead of overwriting
          if [ ! -f README.md ]; then
            echo "## Docker Image Synchronization History 🐳" > README.md
            echo "" >> README.md
            echo "(This file was updated by GitHub Actions.)" >> README.md
          fi
          
          echo "## Sync at $timestamp" >> README.md
          for image in $images; do
            echo "* [$image]()" >> README.md
          done
          echo "" >> README.md

      - name: Commit and push README.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "Update README.md via GitHub Actions" || true

          git push origin HEAD
